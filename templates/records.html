{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">Student Records</h2>

<table class="table table-bordered table-hover">

<thead class="table-success">
<tr>
<th>Student ID</th>
<th>Name</th>
<th>Department</th>
<th>Year</th>
<th>Attendance</th>
<th>CGPA</th>
</tr>
</thead>

<tbody>

{% for student in students %}
<tr>
<td>{{ student.id }}</td>
<td>{{ student.name }}</td>
<td>{{ student.department }}</td>
<td>{{ student.year }}</td>
<td>{{ student.attendance }}</td>
<td>{{ student.cgpa }}</td>
</tr>
{% endfor %}

</tbody>

</table>

{% endblock %}
