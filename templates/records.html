{% extends "base.html" %}

{% block content %}

<h2>Student Records</h2>

<table border="1">
    <tr>
        <th>Enroolment no</th>
        <th>Name</th>
        <th>Roll No</th>
         <th>Department</th>
      
    </tr>

    {% for student in students %}
    <tr>
        <td>{{ student.enrollment}}</td>
        <td>{{ student.name }}</td>
        <td>{{ student.roll }}</td>
        <td>{{ student.department }}</td>
    </tr>
    {% endfor %}

</table>

{% endblock %}
